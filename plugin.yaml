name: kanban-forum-sync
version: "1.0.0"
description: Sync Hermes Kanban tasks to Discord Forum channels
author: otsune
requires_env:
  - name: FORUM_SYNC_BOT_TOKEN
    description: >-
      Discord Bot Token (from Discord Developer Portal).
      未設定の場合は DISCORD_BOT_TOKEN をフォールバックとして使用。
    secret: true
  - name: FORUM_SYNC_CHANNEL_ID
    description: >-
      Discord Forum Channel ID (snowflake).
      Optional: if unset or empty, bot will auto-discover or create a forum named
      'kanban' / 'task-board' in the first accessible guild.
  - name: FORUM_SYNC_POLL_INTERVAL
    description: "Polling interval in seconds (default: 15)"
    default: "15"
provides_hooks:
  - post_plugin_init
